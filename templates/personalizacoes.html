{% extends "base.html" %}
{% block title %}Personalizações — Ferramenta de Pedidos{% endblock %}

{% block content %}
<div class="d-flex align-items-center justify-content-between mb-3">
    <div>
        <h5 class="mb-0 fw-bold">Personalizações</h5>
        <small class="text-muted">Acompanhe o processo de personalização por pedido</small>
    </div>
    <div class="d-flex gap-2">
        <button class="btn btn-outline-secondary btn-sm" onclick="carregar()">
            <i class="bi bi-arrow-clockwise me-1"></i>Atualizar
        </button>
        <button class="btn btn-primary btn-sm px-3" onclick="abrirModal()">
            <i class="bi bi-plus-lg me-1"></i>Nova Personalização
        </button>
    </div>
</div>

<!-- Resumo por status -->
<div id="resumoStatus" class="d-flex flex-wrap gap-2 mb-3"></div>

<!-- Filtros -->
<div class="d-flex flex-wrap gap-2 mb-4 align-items-center">
    <div style="position:relative;flex:1;min-width:220px;max-width:340px">
        <i class="bi bi-search" style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem"></i>
        <input id="fbBusca" type="text" class="form-control form-control-sm"
               placeholder="Buscar por nome ou número do pedido..." style="padding-left:30px"
               oninput="aplicarFiltro()">
    </div>
    <div class="d-flex align-items-center gap-1">
        <label style="font-size:.78rem;color:var(--muted)">De</label>
        <input id="fbDe" type="date" class="form-control form-control-sm" style="width:140px" onchange="aplicarFiltro()" title="Data inicial">
        <span style="color:var(--muted)">→</span>
        <input id="fbAte" type="date" class="form-control form-control-sm" style="width:140px" onchange="aplicarFiltro()" title="Data final">
    </div>
    <button class="btn btn-outline-secondary btn-sm" onclick="limparFiltro()">
        <i class="bi bi-x-circle me-1"></i>Limpar
    </button>
    <span id="fbContador" style="font-size:.78rem;color:var(--muted)"></span>
</div>

<!-- Kanban -->
<div style="overflow:auto;max-height:calc(100vh - 230px);padding-bottom:1rem">
    <div id="kanban" class="d-flex gap-3" style="min-width:900px;align-items:flex-start"></div>
</div>

<!-- Modal nova / editar -->
<div class="modal fade" id="modalForm" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:var(--card-bg);border:1px solid var(--border)">
            <div class="modal-header" style="border-bottom:1px solid var(--border)">
                <h6 class="modal-title fw-bold" id="modalFormTitulo">Nova Personalização</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <input type="hidden" id="editId">
                <div class="mb-3">
                    <label class="form-label">Número do Pedido <span style="color:var(--red)">*</span></label>
                    <input id="fNumeroPedido" type="text" class="form-control form-control-sm"
                           placeholder="Ex: 6500">
                </div>
                <div class="row g-2 mb-3">
                    <div class="col">
                        <label class="form-label">Nome (camiseta)</label>
                        <input id="fNome" type="text" class="form-control form-control-sm"
                               placeholder="Ex: João Silva">
                    </div>
                    <div class="col-4">
                        <label class="form-label">Número (camiseta)</label>
                        <input id="fNumero" type="text" class="form-control form-control-sm"
                               placeholder="Ex: 10">
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tipo</label>
                    <select id="fTipo" class="form-select form-select-sm"
                            style="background:var(--card-bg);border-color:var(--border);color:var(--text)">
                        <option value="varejo">Varejo</option>
                        <option value="atacado">Atacado</option>
                    </select>
                </div>
                <div class="mb-1">
                    <label class="form-label">Observação</label>
                    <input id="fObs" type="text" class="form-control form-control-sm"
                           placeholder="Cor, tamanho, detalhes…">
                </div>
            </div>
            <div class="modal-footer" style="border-top:1px solid var(--border)">
                <button class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
                <button class="btn btn-primary btn-sm px-4" onclick="salvarForm()">Salvar</button>
            </div>
        </div>
    </div>
</div>

<!-- Modal histórico -->
<div class="modal fade" id="modalHist" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content" style="background:var(--card-bg);border:1px solid var(--border)">
            <div class="modal-header" style="border-bottom:1px solid var(--border)">
                <h6 class="modal-title fw-bold"><i class="bi bi-clock-history me-2"></i>Histórico da Personalização</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="histBody" style="max-height:60vh;overflow-y:auto"></div>
        </div>
    </div>
</div>

<!-- Toast -->
<div class="position-fixed bottom-0 end-0 p-3" style="z-index:9999">
    <div id="toast" class="toast align-items-center border-0" role="alert">
        <div class="d-flex">
            <div class="toast-body fw-semibold" id="toastMsg"></div>
            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const COLS = [
    { status: 'A SEPARAR',         cor: '#f85149', bg: 'rgba(248,81,73,.1)',   icone: 'bi-inbox-fill' },
    { status: 'SEPARAÇÃO',         cor: '#f0883e', bg: 'rgba(240,136,62,.1)',  icone: 'bi-scissors' },
    { status: 'NA PERSONALIZAÇÃO', cor: '#8957e5', bg: 'rgba(137,87,229,.1)',  icone: 'bi-brush-fill' },
    { status: 'PRONTO',            cor: '#3fb950', bg: 'rgba(63,185,80,.1)',   icone: 'bi-check-circle-fill' },
    { status: 'ENVIADO',           cor: '#8b949e', bg: 'rgba(139,148,158,.1)', icone: 'bi-send-check-fill' },
];

const PROX = {
    'A SEPARAR':         'SEPARAÇÃO',
    'SEPARAÇÃO':         'NA PERSONALIZAÇÃO',
    'NA PERSONALIZAÇÃO': 'PRONTO',
    'PRONTO':            'ENVIADO',
    'ENVIADO':           null,
};

const PROX_LABEL = {
    'A SEPARAR':         'Iniciar Separação',
    'SEPARAÇÃO':         'Enviar p/ Personalização',
    'NA PERSONALIZAÇÃO': 'Marcar como Pronto',
    'PRONTO':            'Marcar como Enviado',
};

// Status anterior (para retroceder no fluxo)
const ANTERIOR = {
    'ENVIADO':           'PRONTO',
    'PRONTO':            'NA PERSONALIZAÇÃO',
    'NA PERSONALIZAÇÃO': 'SEPARAÇÃO',
    'SEPARAÇÃO':         'A SEPARAR',
    'A SEPARAR':         null,
};

// Aparência da tag varejo/atacado
const TIPO_TAG = {
    varejo:  { label: 'Varejo',  cor: '#58a6ff', bg: 'rgba(88,166,255,.15)' },
    atacado: { label: 'Atacado', cor: '#d29922', bg: 'rgba(210,153,34,.15)' },
};

let todos = [];

// Pedidos com os detalhes minimizados (persiste no navegador entre recargas)
let pedidosColapsados = new Set();
try { pedidosColapsados = new Set(JSON.parse(localStorage.getItem('persColapsados') || '[]')); } catch {}

function toggleColapsarPedido(numped) {
    numped = String(numped);
    if (pedidosColapsados.has(numped)) pedidosColapsados.delete(numped);
    else pedidosColapsados.add(numped);
    try { localStorage.setItem('persColapsados', JSON.stringify([...pedidosColapsados])); } catch {}
    renderKanban();   // re-renderiza local, sem buscar no banco (zero leitura)
}

function toast(msg, ok = true) {
    const el = document.getElementById('toast');
    el.className = `toast align-items-center border-0 text-bg-${ok ? 'success' : 'danger'}`;
    document.getElementById('toastMsg').textContent = msg;
    bootstrap.Toast.getOrCreateInstance(el, { delay: 3000 }).show();
}

// ── Atualização automática (vê mudanças de outra pessoa quase em tempo real) ──
let _persVersion = null;

async function carregar() {
    // Lê a versão ANTES da lista: se algo mudar durante a carga, o baseline fica
    // "atrasado" e o próximo poll recarrega — assim nunca se perde uma atualização.
    let vAntes = _persVersion;
    try {
        const rv = await fetch('/api/personalizacoes/version');
        vAntes = (await rv.json()).v;
    } catch {}
    try {
        const r = await fetch('/api/personalizacoes');
        todos = await r.json();
        renderKanban();
        renderResumo();
    } catch {
        toast('Erro ao carregar personalizações.', false);
    }
    _persVersion = vAntes;
}

async function checarVersao() {
    try {
        const r = await fetch('/api/personalizacoes/version');
        const v = (await r.json()).v;
        if (_persVersion === null) { _persVersion = v; return; }
        if (v !== _persVersion) {     // outra pessoa mudou algo → recarrega a lista
            await carregar();
            carregarPersBadge();
        }
    } catch {}
}

// ── Filtros (por nome, número e data) ──────────────────────────────────────────
function getFiltrados() {
    const q   = (document.getElementById('fbBusca')?.value || '').toLowerCase().trim();
    const de  = document.getElementById('fbDe')?.value || '';
    const ate = document.getElementById('fbAte')?.value || '';

    return todos.filter(p => {
        // Texto: número do pedido, número da camiseta, nome, observação
        if (q) {
            const hay = [
                p.numero_pedido, p.numero_personalizacao,
                p.nome_personalizacao, p.observacao,
            ].map(x => String(x || '')).join(' ').toLowerCase();
            if (!hay.includes(q)) return false;
        }
        // Data (criado_em em YYYY-MM-DD)
        if (de || ate) {
            const d = (p.criado_em || '').slice(0, 10);
            if (!d) return false;
            if (de && d < de)  return false;
            if (ate && d > ate) return false;
        }
        return true;
    });
}

function aplicarFiltro() {
    renderResumo();
    renderKanban();
}

function limparFiltro() {
    document.getElementById('fbBusca').value = '';
    document.getElementById('fbDe').value    = '';
    document.getElementById('fbAte').value   = '';
    aplicarFiltro();
}

function renderResumo() {
    const lista = getFiltrados();
    const counts = {};
    COLS.forEach(c => counts[c.status] = 0);
    lista.forEach(p => { if (counts[p.status] !== undefined) counts[p.status]++; });

    // Contador de filtro
    const cont = document.getElementById('fbContador');
    if (cont) {
        cont.textContent = lista.length === todos.length
            ? `${todos.length} personalizações`
            : `${lista.length} de ${todos.length}`;
    }

    document.getElementById('resumoStatus').innerHTML = COLS.map(c => {
        const n = counts[c.status] || 0;
        return `<span style="background:${c.bg};border:1px solid ${c.cor}33;border-radius:20px;
                             padding:3px 14px;font-size:.8rem;cursor:default">
            <i class="bi ${c.icone} me-1" style="color:${c.cor}"></i>
            <strong style="color:${c.cor}">${n}</strong>
            <span style="color:var(--muted);margin-left:4px">${c.status}</span>
        </span>`;
    }).join('');
}

function renderKanban() {
    const lista = getFiltrados();
    const grupos = {};
    COLS.forEach(c => grupos[c.status] = []);
    lista.forEach(p => { if (grupos[p.status] !== undefined) grupos[p.status].push(p); });

    document.getElementById('kanban').innerHTML = COLS.map(col => {
        const itens = grupos[col.status];
        let cards;
        if (itens.length === 0) {
            cards = `<div style="text-align:center;padding:2rem 0;color:var(--muted);font-size:.8rem">
                   <i class="bi bi-inbox" style="font-size:1.5rem;display:block;margin-bottom:6px"></i>
                   Nenhuma aqui
               </div>`;
        } else {
            // Agrupa as personalizações por número do pedido (um pedido pode ter 1+)
            const porPedido = new Map();
            itens.forEach(p => {
                const k = p.numero_pedido;
                if (!porPedido.has(k)) porPedido.set(k, []);
                porPedido.get(k).push(p);
            });
            cards = Array.from(porPedido.entries()).map(([numped, pers]) => {
                const inner = pers.map(p => renderCard(p, col)).join('');
                const n = pers.length;
                const colapsado = pedidosColapsados.has(String(numped));
                return `<div style="margin-bottom:10px;border:1px solid ${col.cor}33;border-radius:8px;overflow:hidden">
                    <div style="background:${col.cor}14;padding:5px 9px;display:flex;align-items:center;justify-content:space-between;gap:6px">
                        <span style="font-size:.74rem;font-weight:800;color:${col.cor}">
                            <i class="bi bi-receipt me-1"></i>Pedido #${String(numped).replace(/^#+/, '')}
                        </span>
                        <div style="display:flex;align-items:center;gap:8px">
                            ${n > 1 ? `<span style="font-size:.62rem;color:var(--muted)">${n} pers.</span>` : ''}
                            <button onclick="toggleColapsarPedido('${numped}')" title="${colapsado ? 'Mostrar detalhes' : 'Minimizar detalhes'}"
                                    style="background:none;border:none;color:${col.cor};cursor:pointer;font-size:.95rem;line-height:1;padding:0">
                                <i class="bi bi-${colapsado ? 'chevron-down' : 'chevron-up'}"></i>
                            </button>
                        </div>
                    </div>
                    <div style="padding:7px 7px 1px;${colapsado ? 'display:none' : ''}">${inner}</div>
                </div>`;
            }).join('');
        }

        return `<div style="flex:0 0 220px;min-width:220px">
            <div style="position:sticky;top:0;z-index:3;padding:8px 10px 6px;border-radius:8px 8px 0 0;
                        background:var(--card-bg);border:1px solid ${col.cor}44;border-bottom:2px solid ${col.cor}66;
                        display:flex;align-items:center;justify-content:space-between">
                <span style="font-size:.72rem;font-weight:700;letter-spacing:.07em;color:${col.cor}">
                    <i class="bi ${col.icone} me-1"></i>${col.status}
                </span>
                <span style="background:${col.cor}22;color:${col.cor};border-radius:10px;
                             font-size:.7rem;font-weight:700;padding:1px 7px">${itens.length}</span>
            </div>
            <div style="border:1px solid ${col.cor}33;border-top:none;border-radius:0 0 8px 8px;
                        background:rgba(255,255,255,.015);padding:8px;min-height:80px">
                ${cards}
            </div>
        </div>`;
    }).join('');
}

function renderCard(p, col) {
    const prox = PROX[p.status];
    const proxLabel = PROX_LABEL[p.status];
    const anterior = ANTERIOR[p.status];
    const dataFmt = p.criado_em ? p.criado_em.slice(0, 10).split('-').reverse().join('/') : '—';

    const pendente = !p.nome_personalizacao && !p.numero_personalizacao;

    const tipo = (p.tipo === 'atacado') ? TIPO_TAG.atacado : TIPO_TAG.varejo;
    const tipoTag = `<span style="background:${tipo.bg};border:1px solid ${tipo.cor}55;color:${tipo.cor};
                         border-radius:10px;padding:0 7px;font-size:.62rem;font-weight:700;
                         letter-spacing:.04em">${tipo.label}</span>`;

    return `<div style="background:var(--card-bg);border:1px solid ${pendente ? 'rgba(137,87,229,.35)' : 'var(--border)'};
                        border-radius:6px;padding:10px;margin-bottom:8px;position:relative">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px">
            <div>
                <div style="display:flex;align-items:center;gap:5px;flex-wrap:wrap">
                    ${tipoTag}
                </div>
                ${p.nome_personalizacao
                    ? `<div style="font-size:.85rem;font-weight:600;color:var(--text);margin-top:2px">${p.nome_personalizacao}</div>`
                    : `<div style="font-size:.75rem;color:#8957e5;margin-top:3px;font-style:italic">
                           <i class="bi bi-pencil-square me-1"></i>Preencher nome e número
                       </div>`}
                ${p.numero_personalizacao
                    ? `<div style="font-size:.78rem;color:var(--muted)">Nº ${p.numero_personalizacao}</div>`
                    : ''}
                ${p.observacao
                    ? `<div style="font-size:.75rem;color:var(--muted);margin-top:3px;font-style:italic">${p.observacao}</div>`
                    : ''}
                <div style="font-size:.68rem;color:var(--muted);margin-top:5px">${dataFmt}</div>
            </div>
            <div class="d-flex flex-column gap-1">
                <button onclick="editarCard(${p.id})" title="Editar"
                        style="background:none;border:1px solid var(--border);color:var(--muted);
                               border-radius:4px;padding:2px 6px;font-size:.72rem;cursor:pointer;line-height:1.4">
                    <i class="bi bi-pencil"></i>
                </button>
                <button onclick="verHistorico(${p.id})" title="Histórico"
                        style="background:none;border:1px solid rgba(88,166,255,.3);color:#58a6ff;
                               border-radius:4px;padding:2px 6px;font-size:.72rem;cursor:pointer;line-height:1.4">
                    <i class="bi bi-clock-history"></i>
                </button>
                <button onclick="confirmarExcluir(${p.id}, '${p.numero_pedido}')" title="Excluir"
                        style="background:none;border:1px solid rgba(248,81,73,.3);color:var(--red);
                               border-radius:4px;padding:2px 6px;font-size:.72rem;cursor:pointer;line-height:1.4">
                    <i class="bi bi-trash3"></i>
                </button>
            </div>
        </div>
        <div style="display:flex;gap:5px;margin-top:8px">
            ${anterior ? `
            <button onclick="avancarStatus(${p.id}, '${anterior}')" title="Voltar para ${anterior}"
                    style="flex:0 0 auto;background:rgba(139,148,158,.1);border:1px solid var(--border);
                           color:var(--muted);border-radius:4px;padding:4px 9px;font-size:.72rem;
                           cursor:pointer;font-weight:600">
                <i class="bi bi-arrow-left-short"></i>
            </button>` : ''}
            ${prox ? `
            <button onclick="avancarStatus(${p.id}, '${prox}')"
                    style="flex:1;background:${col.bg};border:1px solid ${col.cor}55;
                           color:${col.cor};border-radius:4px;padding:4px 0;font-size:.72rem;
                           font-weight:600;cursor:pointer;transition:background .15s"
                    onmouseover="this.style.background='${col.bg.replace('.1)', '.2)')}';"
                    onmouseout="this.style.background='${col.bg}';">
                ${proxLabel} <i class="bi bi-arrow-right-short"></i>
            </button>` : ''}
        </div>
    </div>`;
}

async function avancarStatus(id, novoStatus) {
    try {
        const r = await fetch(`/api/personalizacoes/${id}/status`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ status: novoStatus }),
        });
        if (!r.ok) { toast('Erro ao atualizar status.', false); return; }
        await carregar();
        carregarPersBadge();
    } catch {
        toast('Erro de conexão.', false);
    }
}

function abrirModal(p = null) {
    document.getElementById('editId').value = p ? p.id : '';
    document.getElementById('modalFormTitulo').textContent = p ? 'Editar Personalização' : 'Nova Personalização';
    document.getElementById('fNumeroPedido').value = p ? p.numero_pedido : '';
    document.getElementById('fNome').value = p ? (p.nome_personalizacao || '') : '';
    document.getElementById('fNumero').value = p ? (p.numero_personalizacao || '') : '';
    document.getElementById('fObs').value = p ? (p.observacao || '') : '';
    document.getElementById('fTipo').value = p ? (p.tipo || 'varejo') : 'varejo';
    document.getElementById('fNumeroPedido').disabled = !!p;
    new bootstrap.Modal(document.getElementById('modalForm')).show();
}

function editarCard(id) {
    const p = todos.find(x => x.id === id);
    if (p) abrirModal(p);
}

async function salvarForm() {
    const id     = document.getElementById('editId').value;
    const numero = document.getElementById('fNumeroPedido').value.trim();
    if (!numero) { toast('Número do pedido é obrigatório.', false); return; }

    const body = {
        numero_pedido:         numero,
        nome_personalizacao:   document.getElementById('fNome').value.trim(),
        numero_personalizacao: document.getElementById('fNumero').value.trim(),
        observacao:            document.getElementById('fObs').value.trim(),
        tipo:                  document.getElementById('fTipo').value,
    };

    try {
        let r;
        if (id) {
            r = await fetch(`/api/personalizacoes/${id}`, {
                method: 'PATCH',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
        } else {
            r = await fetch('/api/personalizacoes', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(body),
            });
        }
        const j = await r.json();
        if (!r.ok) { toast(j.erro || 'Erro ao salvar.', false); return; }
        bootstrap.Modal.getInstance(document.getElementById('modalForm')).hide();
        toast(id ? 'Personalização atualizada.' : 'Personalização criada.');
        await carregar();
        carregarPersBadge();
    } catch {
        toast('Erro de conexão.', false);
    }
}

async function confirmarExcluir(id, numPedido) {
    if (!confirm(`Excluir personalização do pedido #${numPedido}?`)) return;
    try {
        await fetch(`/api/personalizacoes/${id}`, { method: 'DELETE' });
        toast('Personalização excluída.');
        await carregar();
        carregarPersBadge();
    } catch {
        toast('Erro ao excluir.', false);
    }
}

// ── Histórico ──────────────────────────────────────────────────────────
const ACAO_INFO = {
    criada:     { label: 'Criada',   icone: 'bi-plus-circle-fill',        cor: '#3fb950' },
    status:     { label: 'Avançou',  icone: 'bi-arrow-right-circle-fill', cor: '#58a6ff' },
    retrocesso: { label: 'Voltou',   icone: 'bi-arrow-left-circle-fill',  cor: '#f0883e' },
    editada:    { label: 'Editada',  icone: 'bi-pencil-fill',             cor: '#8957e5' },
    excluida:   { label: 'Excluída', icone: 'bi-trash3-fill',             cor: '#f85149' },
};

function escHtmlH(s) {
    return String(s ?? '').replace(/[&<>"']/g, c =>
        ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function fmtDataHora(s) {
    if (!s) return '';
    const m = String(s).replace('T', ' ').match(/(\d{4})-(\d{2})-(\d{2})[ ](\d{2}):(\d{2})/);
    return m ? `${m[3]}/${m[2]}/${m[1]} ${m[4]}:${m[5]}` : s;
}

async function verHistorico(id) {
    const body = document.getElementById('histBody');
    body.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)"><i class="bi bi-hourglass-split me-1"></i>Carregando…</div>';
    new bootstrap.Modal(document.getElementById('modalHist')).show();
    try {
        const r = await fetch(`/api/personalizacoes/${id}/historico`);
        const itens = await r.json();
        if (!Array.isArray(itens) || !itens.length) {
            body.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--muted)">Nenhum registro ainda.</div>';
            return;
        }
        body.innerHTML = itens.map(h => {
            const info = ACAO_INFO[h.acao] || { label: h.acao, icone: 'bi-dot', cor: 'var(--muted)' };
            return `<div style="display:flex;gap:10px;padding:8px 2px;border-bottom:1px solid var(--border)">
                <i class="bi ${info.icone}" style="color:${info.cor};font-size:1.05rem;margin-top:2px"></i>
                <div style="flex:1">
                    <div style="font-size:.82rem;color:var(--text)">
                        <span style="font-weight:600">${info.label}</span>
                        ${h.detalhe ? `<span style="color:var(--muted)"> — ${escHtmlH(h.detalhe)}</span>` : ''}
                    </div>
                    <div style="font-size:.68rem;color:var(--muted);margin-top:2px">
                        ${fmtDataHora(h.created_at)}${h.usuario ? ' · ' + escHtmlH(h.usuario) : ''}
                    </div>
                </div>
            </div>`;
        }).join('');
    } catch {
        body.innerHTML = '<div style="text-align:center;padding:2rem;color:var(--red)">Erro ao carregar histórico.</div>';
    }
}

carregar();

// Verifica a cada 7s se outra pessoa mudou algo (só com a aba visível, para
// não gastar leituras à toa). A checagem lê só 1 linha; recarrega a lista
// inteira apenas quando o contador muda.
setInterval(() => { if (!document.hidden) checarVersao(); }, 7000);
document.addEventListener('visibilitychange', () => { if (!document.hidden) checarVersao(); });
</script>
