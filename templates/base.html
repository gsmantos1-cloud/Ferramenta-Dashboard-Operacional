<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}GS Mantos{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Tema aplicado antes do render para evitar flash -->
    <script>
        if (localStorage.getItem('gs-tema') === 'claro') document.documentElement.classList.add('light');
    </script>
    <style>
        /* ── Tema escuro (padrão) ── */
        :root {
            --bg:        #0d1117;
            --card-bg:   #161b22;
            --border:    #30363d;
            --text:      #e6edf3;
            --muted:     #8b949e;
            --green:     #3fb950;
            --yellow:    #d29922;
            --orange:    #f0883e;
            --red:       #f85149;
            --blue:      #58a6ff;
            --nav-bg:    #010409;
            --input-bg:  #0d1117;
            --input-bg2: #161b22;
            --hover-row: rgba(255,255,255,0.03);
            --hover-btn: rgba(255,255,255,0.07);
            --chip-bg:   rgba(255,255,255,.06);
            --shadow:    rgba(0,0,0,.5);
            --btn-close-filter: invert(1);
        }

        /* ── Tema claro ── */
        html.light {
            --bg:        #f6f8fa;
            --card-bg:   #ffffff;
            --border:    #d0d7de;
            --text:      #24292f;
            --muted:     #57606a;
            --green:     #1a7f37;
            --yellow:    #7d4e00;
            --orange:    #953800;
            --red:       #cf222e;
            --blue:      #0969da;
            --nav-bg:    #ffffff;
            --input-bg:  #ffffff;
            --input-bg2: #f6f8fa;
            --hover-row: rgba(0,0,0,0.03);
            --hover-btn: rgba(0,0,0,0.06);
            --chip-bg:   rgba(0,0,0,.05);
            --shadow:    rgba(0,0,0,.15);
            --btn-close-filter: none;
        }

        * { box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; transition: background .2s, color .2s; }

        /* Nav */
        .navbar { background: var(--nav-bg) !important; border-bottom: 1px solid var(--border); }
        .navbar-brand { font-weight: 700; font-size: 1rem; color: var(--text) !important; letter-spacing: -0.01em; }
        .nav-link { color: var(--muted) !important; font-size: 0.9rem; padding: 0.4rem 0.75rem !important; border-radius: 6px; }
        .nav-link:hover { color: var(--text) !important; background: var(--hover-btn); }
        .nav-link.active { color: var(--text) !important; background: var(--hover-btn); }

        /* Cards */
        .card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 8px; }
        .card-header { background: var(--hover-row); border-bottom: 1px solid var(--border); padding: 0.6rem 1rem; }
        .card-header small { font-size: 0.72rem; letter-spacing: 0.06em; }

        /* Status cards */
        .status-card { border-left: 3px solid; transition: transform 0.15s, box-shadow 0.15s; }
        .status-card:hover { transform: translateY(-2px); box-shadow: 0 4px 20px var(--shadow); }
        .s-prazo    { border-left-color: var(--green); }
        .s-leve     { border-left-color: var(--yellow); }
        .s-moderado { border-left-color: var(--orange); }
        .s-critico  { border-left-color: var(--red); }

        /* Badges */
        .b-prazo      { background: rgba(63,185,80,.15);  color: var(--green);  border: 1px solid rgba(63,185,80,.35);  }
        .b-leve       { background: rgba(210,153,34,.15); color: var(--yellow); border: 1px solid rgba(210,153,34,.35); }
        .b-moderado   { background: rgba(240,136,62,.15); color: var(--orange); border: 1px solid rgba(240,136,62,.35); }
        .b-critico    { background: rgba(248,81,73,.15);  color: var(--red);    border: 1px solid rgba(248,81,73,.35);  }
        .b-cancelado  { background: rgba(139,148,158,.12); color: var(--muted); border: 1px solid rgba(139,148,158,.3); }

        html.light .b-prazo    { background: #dafbe1; }
        html.light .b-leve     { background: #fff8c5; }
        html.light .b-moderado { background: #fff1e5; }
        html.light .b-critico  { background: #ffebe9; }
        html.light .b-cancelado{ background: #f6f8fa; }

        .cat-toggle { cursor: pointer; font-size: 0.82rem; color: var(--muted); border-bottom: 1px dashed transparent; transition: color .15s, border-color .15s; }
        .cat-toggle:hover { color: var(--blue); border-bottom-color: var(--blue); }

        /* Table */
        .table { color: var(--text); margin: 0; }
        .table thead th { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.07em; border-bottom: 1px solid var(--border); padding: 0.65rem 0.75rem; font-weight: 600; }
        .table td { border-bottom: 1px solid var(--border); vertical-align: middle; padding: 0.7rem 0.75rem; }
        .table tbody tr:last-child td { border-bottom: none; }
        .table tbody tr:hover { background: var(--hover-row); }

        /* Forms */
        .form-control, .form-select {
            background: var(--input-bg); border: 1px solid var(--border);
            color: var(--text); border-radius: 6px;
        }
        .form-control:focus, .form-select:focus {
            background: var(--input-bg); border-color: var(--blue);
            color: var(--text); box-shadow: 0 0 0 3px rgba(88,166,255,.15);
        }
        .form-control::placeholder { color: var(--muted); }
        .form-label { color: var(--muted); font-size: 0.82rem; margin-bottom: 0.3rem; }
        .form-select option { background: var(--input-bg2); }

        /* Buttons */
        .btn-primary { background: #238636; border-color: #238636; font-weight: 500; color: #fff; }
        .btn-primary:hover { background: #2ea043; border-color: #2ea043; color: #fff; }
        .btn-outline-secondary { color: var(--muted); border-color: var(--border); }
        .btn-outline-secondary:hover { background: var(--hover-btn); color: var(--text); border-color: var(--border); }
        .btn-outline-danger { color: var(--red); border-color: rgba(248,81,73,.3); }
        .btn-outline-danger:hover { background: rgba(248,81,73,.1); color: var(--red); border-color: var(--red); }
        .btn-close-white { filter: var(--btn-close-filter); }

        /* Modals no tema claro */
        html.light .modal-content { background: var(--card-bg) !important; border-color: var(--border) !important; color: var(--text); }
        html.light .modal-header  { border-bottom-color: var(--border) !important; }
        html.light .modal-footer  { border-top-color:    var(--border) !important; }

        /* Stat numbers */
        .stat-num  { font-size: 2rem; font-weight: 700; line-height: 1; }
        .stat-pct  { font-size: 0.8rem; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
        .stat-label{ font-size: 0.72rem; color: var(--muted); margin-top: 5px; letter-spacing: 0.04em; }

        /* Notification bell */
        .notif-btn {
            position: relative; background: none; border: none;
            color: var(--muted); font-size: 1.15rem; cursor: pointer;
            padding: 4px 8px; border-radius: 6px; transition: color .15s, background .15s;
            line-height: 1;
        }
        .notif-btn:hover { color: var(--text); background: var(--hover-btn); }
        .notif-badge {
            position: absolute; top: -2px; right: -2px;
            background: var(--red); color: #fff;
            font-size: .6rem; font-weight: 700; line-height: 1;
            min-width: 16px; height: 16px; border-radius: 8px;
            display: flex; align-items: center; justify-content: center;
            padding: 0 3px; border: 2px solid var(--nav-bg);
        }
        .notif-dropdown {
            position: absolute; right: 0; top: calc(100% + 10px);
            width: 320px; background: var(--card-bg);
            border: 1px solid var(--border); border-radius: 10px;
            box-shadow: 0 8px 32px var(--shadow);
            z-index: 9999; display: none;
        }
        .notif-dropdown.show { display: block; }
        .notif-group { border-bottom: 1px solid var(--border); }
        .notif-group:last-child { border-bottom: none; }
        .notif-numeros {
            display: none; flex-wrap: wrap; gap: 4px;
            padding: 0 1rem .75rem;
        }
        .notif-numeros.show { display: flex; }
        .num-chip {
            font-size: .72rem; padding: 2px 8px; border-radius: 4px;
            background: var(--chip-bg); border: 1px solid var(--border);
            color: var(--muted); font-family: monospace;
        }

        /* Logo */
        .brand-logo { height: 28px; width: auto; object-fit: contain; }
        .brand-wordmark { font-size: .78rem; font-weight: 700; letter-spacing: .08em; color: var(--text); line-height: 1.1; }
        .brand-sub { font-size: .6rem; color: var(--muted); letter-spacing: .12em; font-weight: 400; }

        /* Toggle tema */
        .tema-btn {
            background: none; border: 1px solid var(--border);
            color: var(--muted); font-size: .85rem; cursor: pointer;
            padding: 4px 10px; border-radius: 6px;
            transition: color .15s, background .15s, border-color .15s;
            line-height: 1.6; display: flex; align-items: center; gap: 5px;
        }
        .tema-btn:hover { color: var(--text); background: var(--hover-btn); border-color: var(--muted); }
        html.light .tema-btn { color: var(--muted); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark sticky-top">
    <div class="container-xl">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            {% if logo_exists %}
                <img src="{{ url_for('static', filename='logo.png') }}" class="brand-logo" alt="GS Mantos">
            {% else %}
                <div style="width:28px;height:28px;background:#fff;border-radius:4px;display:flex;align-items:center;justify-content:center">
                    <span style="font-size:.7rem;font-weight:900;color:#000;letter-spacing:-.5px">GS</span>
                </div>
            {% endif %}
            <div>
                <div class="brand-wordmark">GS Mantos</div>
                <div class="brand-sub">OPERACIONAL</div>
            </div>
        </a>
        <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-1">
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                        <i class="bi bi-speedometer2 me-1"></i>Dashboard
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/relatorios' %}active{% endif %}" href="/relatorios">
                        <i class="bi bi-bar-chart-fill me-1"></i>Relatórios
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/romaneio' %}active{% endif %}" href="/romaneio">
                        <i class="bi bi-truck me-1"></i>Romaneio
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/custos-sku' %}active{% endif %}" href="/custos-sku">
                        <i class="bi bi-tags-fill me-1"></i>Custos SKU
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/projecao-estoque' %}active{% endif %}" href="/projecao-estoque">
                        <i class="bi bi-graph-up-arrow me-1"></i>Projeção
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/compras' %}active{% endif %}" href="/compras">
                        <i class="bi bi-cart-fill me-1"></i>Compras
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/atacado' %}active{% endif %}" href="/atacado">
                        <i class="bi bi-building me-1"></i>Atacado
                    </a>
                </li>
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/personalizacoes' %}active{% endif %}" href="/personalizacoes"
                       style="position:relative">
                        <i class="bi bi-stars me-1"></i>Personalizações
                        <span id="persBadgeNav" style="display:none;position:absolute;top:2px;right:2px;
                              background:#8957e5;color:#fff;font-size:.58rem;font-weight:700;
                              min-width:15px;height:15px;border-radius:8px;padding:0 3px;
                              display:none;align-items:center;justify-content:center;
                              border:2px solid #010409"></span>
                    </a>
                </li>
            </ul>

            <!-- Notification bell -->
            <div class="position-relative ms-3" id="notifWrap">
                <button class="notif-btn" id="notifBtn" onclick="toggleNotif()" title="Alertas de status">
                    <i class="bi bi-bell-fill"></i>
                    <span class="notif-badge" id="notifBadge" style="display:none"></span>
                </button>
                <div class="notif-dropdown" id="notifDropdown">
                    <div class="px-3 py-2 d-flex align-items-center justify-content-between"
                         style="border-bottom:1px solid var(--border)">
                        <span style="font-size:.78rem;font-weight:600;letter-spacing:.05em;color:var(--muted)">ALERTAS DE AMANHÃ</span>
                        <button onclick="toggleNotif()" style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;line-height:1">×</button>
                    </div>
                    <div id="notifCorpo">
                        <div class="px-3 py-4 text-center" style="color:var(--muted);font-size:.85rem">
                            <span class="spinner-border spinner-border-sm me-1"></span>Carregando…
                        </div>
                    </div>
                </div>
            </div>

            <button class="tema-btn ms-2" id="temaToggle" onclick="alternarTema()" title="Alternar tema claro/escuro">
                <i class="bi bi-moon-stars-fill" id="temaIcone"></i>
                <span id="temaLabel" style="font-size:.78rem"></span>
            </button>

            <a href="/logout" class="btn btn-outline-secondary btn-sm ms-2"
               style="font-size:.82rem;color:var(--muted);border-color:var(--border)">
                <i class="bi bi-box-arrow-right me-1"></i>Sair
            </a>
        </div>
    </div>
</nav>

<div class="container-xl py-4">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

<script>
const NOTIF_COLOR = {
    'Atraso crítico':  { bg:'rgba(248,81,73,.12)',  border:'rgba(248,81,73,.35)',  text:'#f85149', icon:'bi-x-octagon-fill' },
    'Atraso moderado': { bg:'rgba(240,136,62,.12)', border:'rgba(240,136,62,.35)', text:'#f0883e', icon:'bi-exclamation-circle-fill' },
    'Atraso leve':     { bg:'rgba(210,153,34,.12)', border:'rgba(210,153,34,.35)', text:'#d29922', icon:'bi-exclamation-triangle-fill' },
};

let notifAberto = false;
let notifCarregado = false;

function toggleNotif() {
    notifAberto = !notifAberto;
    document.getElementById('notifDropdown').classList.toggle('show', notifAberto);
    if (notifAberto && !notifCarregado) carregarNotificacoes();
}

document.addEventListener('click', e => {
    if (notifAberto && !document.getElementById('notifWrap').contains(e.target)) {
        notifAberto = false;
        document.getElementById('notifDropdown').classList.remove('show');
    }
});

function toggleNumeros(id) {
    const el = document.getElementById('nums-' + id);
    const btn = document.getElementById('btn-' + id);
    const aberto = el.classList.toggle('show');
    btn.textContent = aberto ? 'Ocultar pedidos' : 'Ver pedidos';
}

async function carregarNotificacoes() {
    try {
        // Compartilha a resposta com outras partes da página (evita 2ª leitura)
        window.__notifPromise = fetch('/api/notificacoes').then(r => r.json());
        const d = await window.__notifPromise;
        notifCarregado = true;

        const badge = document.getElementById('notifBadge');
        const corpo = document.getElementById('notifCorpo');

        const btn = document.getElementById('notifBtn');
        if (d.total === 0) {
            badge.style.display = 'none';
            btn.style.color = '';
            corpo.innerHTML = `<div class="px-3 py-4 text-center" style="color:var(--muted);font-size:.85rem">
                <i class="bi bi-check-circle" style="font-size:1.4rem;display:block;margin-bottom:6px;color:var(--green)"></i>
                Nenhum pedido muda de status amanhã
            </div>`;
            return;
        }

        badge.style.display = 'flex';
        badge.textContent = d.total > 9 ? '9+' : d.total;
        btn.style.color = 'var(--yellow)';

        corpo.innerHTML = d.grupos.map((g, i) => {
            const c = NOTIF_COLOR[g.status] || NOTIF_COLOR['Atraso leve'];
            const plural = g.total !== 1;
            return `<div class="notif-group">
                <div class="px-3 py-3" style="background:${c.bg};border-left:3px solid ${c.text}">
                    <div class="d-flex align-items-center justify-content-between mb-1">
                        <span style="font-size:.82rem;font-weight:600;color:${c.text}">
                            <i class="bi ${c.icon} me-1"></i>${g.status}
                        </span>
                        <span style="font-size:.75rem;color:var(--muted)">${g.total} pedido${plural ? 's' : ''}</span>
                    </div>
                    <div style="font-size:.78rem;color:var(--muted);margin-bottom:6px">
                        ${plural ? `${g.total} pedidos vão para` : `1 pedido vai para`} <strong style="color:${c.text}">${g.status}</strong> amanhã
                    </div>
                    <button id="btn-${i}" onclick="toggleNumeros(${i})"
                            style="background:none;border:1px solid ${c.border};color:${c.text};
                                   font-size:.72rem;padding:2px 10px;border-radius:4px;cursor:pointer">
                        Ver pedidos
                    </button>
                </div>
                <div class="notif-numeros" id="nums-${i}" style="padding:.5rem 1rem .75rem;background:${c.bg}">
                    ${g.numeros.map(n => `<span class="num-chip">#${n}</span>`).join('')}
                </div>
            </div>`;
        }).join('');
    } catch {
        document.getElementById('notifCorpo').innerHTML =
            '<div class="px-3 py-3 text-center" style="color:var(--muted);font-size:.85rem">Erro ao carregar alertas.</div>';
    }
}

// ── Tema claro / escuro ───────────────────────────────────────────────────────
function _aplicarTema(claro) {
    const html   = document.documentElement;
    const icone  = document.getElementById('temaIcone');
    const label  = document.getElementById('temaLabel');
    if (claro) {
        html.classList.add('light');
        icone.className = 'bi bi-sun-fill';
        label.textContent = 'Claro';
    } else {
        html.classList.remove('light');
        icone.className = 'bi bi-moon-stars-fill';
        label.textContent = 'Escuro';
    }
}

function alternarTema() {
    const claro = !document.documentElement.classList.contains('light');
    localStorage.setItem('gs-tema', claro ? 'claro' : 'escuro');
    _aplicarTema(claro);
}

// Aplica o estado correto no botão ao carregar (o CSS já foi aplicado pelo script inline no <head>)
_aplicarTema(document.documentElement.classList.contains('light'));

// Carrega badge e popula dropdown na inicialização
carregarNotificacoes();

async function carregarPersBadge() {
    try {
        const r = await fetch('/api/personalizacoes/stats');
        const d = await r.json();
        const badge = document.getElementById('persBadgeNav');
        if (!badge) return;
        if (d.total_ativas > 0) {
            badge.textContent = d.total_ativas > 9 ? '9+' : d.total_ativas;
            badge.style.display = 'flex';
        } else {
            badge.style.display = 'none';
        }
    } catch { /* silencioso */ }
}
carregarPersBadge();
</script>

{% block scripts %}{% endblock %}
</body>
</html>
